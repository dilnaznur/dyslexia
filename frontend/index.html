<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>MindStep - Early Dyslexia Detection Platform</title>
    <meta name="title" content="MindStep - Early Dyslexia Detection Platform" />
    <meta name="description" content="Clinical-grade, multimodal AI platform for early dyslexia detection in children (ages 5-10) with 90%+ diagnostic accuracy." />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="MindStep - Early Dyslexia Detection Platform" />
    <meta property="og:description" content="Clinical-grade AI for early dyslexia detection with multimodal assessment." />

    <!-- WebGazer.js -->
    <script src="https://cdn.jsdelivr.net/npm/webgazer@2.0.1/dist/webgazer.min.js"></script>

    <!-- Preconnect to external resources -->
    <link rel="preconnect" href="https://fonts.cdnfonts.com" />
    <link rel="preconnect" href="https://generativelanguage.googleapis.com" />

    <!-- OpenDyslexic Font -->
    <link href="https://fonts.cdnfonts.com/css/opendyslexic" rel="stylesheet" />

    <style>
      /* Prevent flash of unstyled content */
      html {
        background-color: #FAFBFC;
      }

      /* Loading screen */
      #loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #A8E6CF 0%, #89CFF0 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }

      #loading-screen.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .loader {
        width: 50px;
        height: 50px;
        border: 5px solid rgba(255, 255, 255, 0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <!-- Loading Screen -->
    <div id="loading-screen">
      <div class="loader"></div>
    </div>

    <!-- React Root -->
    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>

    <script>
      // Hide loading screen when React app loads
      window.addEventListener('load', () => {
        setTimeout(() => {
          const loadingScreen = document.getElementById('loading-screen');
          if (loadingScreen) {
            loadingScreen.classList.add('hidden');
          }
        }, 500);
      });
    </script>
  </body>
</html>
